name: moai-inference-framework-dev-deploy

on:
  push:
    branches:
      - main
    paths:
      - deploy/helm/moai-inference-framework/**
  workflow_dispatch:

jobs:
  release:
    name: Release(dev)
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set Version
        id: set-version
        run: |
          # Match only framework release tags (v1.2.3); `preset/v*` tags carry a
          # `/` that is invalid in a chart version and must never be picked here.
          VERSION=$(git describe --tags --always --dirty --match 'v[0-9]*')
          echo VERSION=$VERSION
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Release Helm Chart
        uses: ./.github/workflows/release-chart
        with:
          chart_name: moai-inference-framework
          chart_path: deploy/helm/moai-inference-framework
          chart_version: ${{ steps.set-version.outputs.version }}
          publish_artifact_keeper: "true"
          chartmuseum_username: ${{ secrets.ARTIFACT_KEEPER_USERNAME }}
          chartmuseum_password: ${{ secrets.ARTIFACT_KEEPER_PASSWORD }}
