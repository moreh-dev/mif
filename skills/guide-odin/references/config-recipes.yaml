# Odin InferenceService Configuration Recipes
#
# Reference InferenceService and InferenceServiceTemplate examples.
# To use a recipe: uncomment the desired block, replace placeholders (<...>),
# and save as your manifest YAML.
#
# Verification status:
#   [verified]   — Directly sourced from docs, test configs, or chart defaults
#   [unverified] — Constructed from API specs; functionally valid but not
#                  tested in production. Provided as a starting point.

# =============================================================================
# Recipe 1: Simple aggregate with preset [verified]
# =============================================================================
# Source: website/docs/getting-started/quickstart.mdx
# Deploys 2 replicas using a preset. Deployment workload (no LWS).
# Requires: HuggingFace token with model license accepted.
# -----------------------------------------------------------------------------
# apiVersion: odin.moreh.io/v1alpha1
# kind: InferenceService
# metadata:
#   name: vllm-llama3-1b-instruct-tp2
# spec:
#   replicas: 2
#   inferencePoolRefs:
#     - name: heimdall
#   templateRefs:
#     - name: vllm
#     - name: vllm-meta-llama-llama-3.2-1b-instruct-amd-mi250-tp2
#   parallelism:
#     tensor: 2
#   template:
#     spec:
#       containers:
#         - name: main
#           env:
#             - name: HF_TOKEN
#               value: <huggingFaceToken>

