# =============================================================================
# Source: test/e2e/performance/config/inference-service.yaml.tmpl
# Separate InferenceServices for prefill and decode phases.
# Both register with the same Heimdall InferencePool.
# Requires Heimdall with pd-profile-handler configured.
# -----------------------------------------------------------------------------
# # Prefill InferenceService
# apiVersion: odin.moreh.io/v1alpha1
# kind: InferenceService
# metadata:
#   name: <name>-prefill
# spec:
#   replicas: <prefillReplicas>
#   inferencePoolRefs:
#     - name: heimdall
#   templateRefs:
#     - name: vllm-prefill-dp        # or vllm-prefill for non-DP
#     - name: <prefillPreset>
#   parallelism:
#     data: <dataSize>
#     dataLocal: <dataLocalSize>
#     tensor: <tensorSize>
#     expert: true                    # for MoE models
#   workerTemplate:
#     spec:
#       containers:
#         - name: main
#           env:
#             - name: HF_TOKEN
#               value: <huggingFaceToken>
# ---
# # Decode InferenceService
# apiVersion: odin.moreh.io/v1alpha1
# kind: InferenceService
# metadata:
#   name: <name>-decode
# spec:
#   replicas: <decodeReplicas>
