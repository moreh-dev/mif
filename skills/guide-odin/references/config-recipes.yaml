#     - name: heimdall
#   templateRefs:
#     - name: vllm-decode-dp          # or vllm-decode for non-DP
#     - name: <decodePreset>
#   parallelism:
#     data: <dataSize>
#     dataLocal: <dataLocalSize>
#     tensor: <tensorSize>
#     expert: true
#   workerTemplate:
#     spec:
#       containers:
#         - name: main
#           env:
#             - name: HF_TOKEN
