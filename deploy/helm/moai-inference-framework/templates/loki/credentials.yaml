{{- if .Values.loki.enabled }}
{{- $minioHost := .Values.minio.fullnameOverride | default "minio" }}
---
# ConfigMap consumed by Loki components via extraEnvFrom.
# The values are referenced in loki.storage.s3 as ${BUCKET_HOST} etc.,
# which Loki resolves at startup because each component runs with -config.expand-env=true.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
data:
  BUCKET_HOST:   {{ $minioHost | quote }}
  BUCKET_PORT:   "9000"
  BUCKET_REGION: ""
  BUCKET_NAME:   "loki"
---
apiVersion: v1
kind: Secret
metadata:
  name: loki-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
stringData:
  AWS_ACCESS_KEY_ID:     {{ (index .Values.minio.users 0).accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ (index .Values.minio.users 0).secretKey | quote }}
{{- end }}
