{{- if .Values.loki.enabled }}
---
# ConfigMap consumed by Loki components via extraEnvFrom.
# The values are referenced in loki.storage.s3 as ${BUCKET_HOST} etc.,
# which Loki resolves at startup because each component runs with -config.expand-env=true.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
data:
  BUCKET_HOST:   {{ .Values.lokiBucket.host | default (include "mif.subchartFullname" (dict "name" "minio" "ctx" .)) | quote }}
  BUCKET_PORT:   "9000"
  BUCKET_REGION: "us-east-1"
  BUCKET_NAME:   "loki"
---
apiVersion: v1
kind: Secret
metadata:
  name: loki-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
stringData:
  # Dedicated, bucket-scoped MinIO user provisioned by templates/minio/init-job.yaml.
  # The secret key defaults to a generated random value (preserved across upgrades
  # via lookup); set lokiBucket.secretKey to pin it explicitly.
  AWS_ACCESS_KEY_ID:     {{ .Values.lokiBucket.accessKey | default "loki" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ include "mif.bucketSecretKey" (dict "ctx" . "secretName" "loki-bucket" "override" .Values.lokiBucket.secretKey) | quote }}
{{- end }}
