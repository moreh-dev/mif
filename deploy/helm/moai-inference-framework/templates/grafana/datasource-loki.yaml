{{- $ps := index .Values "prometheus-stack" }}
{{- if and .Values.loki.enabled $ps.enabled $ps.grafana.enabled }}
---
# Grafana datasource ConfigMap for Loki.
# The grafana-sidecar discovers ConfigMaps labelled grafana_datasource=1 and
# provisions them as datasources automatically.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.name" . }}-datasource-loki
  namespace: {{ include "common.names.namespace" . }}
  labels:
    grafana_datasource: "1"
    {{- include "mif.labels" . | nindent 4 }}
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        # Stable UID so other provisioned resources (e.g. the Heimdall alert
        # rules under `files/alerts/`) can reference this datasource by a
        # known identifier instead of the random UID Grafana would otherwise
        # assign.
        uid: loki
        type: loki
        access: proxy
        url: http://{{ include "mif.subchartFullname" (dict "name" "loki" "ctx" .) }}-gateway.{{ include "common.names.namespace" . }}.svc.cluster.local
        isDefault: false
        jsonData:
          maxLines: 5000
{{- end }}
