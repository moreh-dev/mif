{{- if (default dict .Values.tempo).enabled }}
---
# ConfigMap consumed by Tempo components via global.extraEnvFrom.
# The values are referenced in tempo.storage.trace.s3 as ${BUCKET_HOST} etc.,
# which Tempo resolves at startup because components run with -config.expand-env=true.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
data:
  BUCKET_HOST:   {{ (default dict .Values.tempoBucket).host | default (include "mif.subchartFullname" (dict "name" "minio" "ctx" .)) | quote }}
  BUCKET_PORT:   "9000"
  BUCKET_REGION: "us-east-1"
  BUCKET_NAME:   "tempo"
---
apiVersion: v1
kind: Secret
metadata:
  name: tempo-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
stringData:
  # Dedicated, bucket-scoped MinIO user provisioned by templates/minio/init-job.yaml.
  # The secret key defaults to a generated random value (preserved across upgrades
  # via lookup); set tempoBucket.secretKey to pin it explicitly.
  AWS_ACCESS_KEY_ID:     {{ (default dict .Values.tempoBucket).accessKey | default "tempo" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ include "mif.bucketSecretKey" (dict "ctx" . "secretName" "tempo-bucket" "override" (default dict .Values.tempoBucket).secretKey) | quote }}
{{- end }}
