{{- if .Values.tempo.enabled }}
---
# ConfigMap consumed by Tempo components via global.extraEnvFrom.
# The values are referenced in tempo.storage.trace.s3 as ${BUCKET_HOST} etc.,
# which Tempo resolves at startup because components run with -config.expand-env=true.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
data:
  BUCKET_HOST:   {{ .Values.tempoBucket.host | default (printf "%s-minio" .Release.Name) | quote }}
  BUCKET_PORT:   "9000"
  BUCKET_REGION: "us-east-1"
  BUCKET_NAME:   "tempo"
---
apiVersion: v1
kind: Secret
metadata:
  name: tempo-bucket
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.labels" . | nindent 4 }}
stringData:
  # Dedicated, bucket-scoped MinIO user provisioned by templates/minio/init-job.yaml.
  AWS_ACCESS_KEY_ID:     {{ .Values.tempoBucket.accessKey | default "tempo" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.tempoBucket.secretKey | default "tempo123!" | quote }}
{{- end }}
