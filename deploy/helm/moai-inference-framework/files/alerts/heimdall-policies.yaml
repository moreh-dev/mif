apiVersion: 1
policies:
  - orgId: 1
    receiver: heimdall-slack
    group_by:
      - grafana_folder
      - alertname
    routes:
      - receiver: heimdall-slack
        object_matchers:
          - - component
            - "="
            - heimdall
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: false
