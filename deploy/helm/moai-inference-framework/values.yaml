# -- Chart name override.
nameOverride: ""

# -- Full name override.
fullnameOverride: ""

# -- Namespace override.
namespaceOverride: ""

# -- Labels applied to all resources.
commonLabels: {}

# -- global values are shared across all sub-charts if the value's key matches.
global:
  # -- Image pull secrets.
  imagePullSecrets: []

prometheus-stack:
  # -- Enable prometheus-community/kube-prometheus-stack. Set to false if already deployed.
  enabled: true

  defaultRules:
    create: false
  windowsMonitoring:
    enabled: false
  alertmanager:
    enabled: false
  grafana:
    enabled: true
    sidecar:
      dashboards:
        enabled: true
      alerts:
        enabled: true
  kubernetesServiceMonitors:
    enabled: true
  kubeApiServer:
    enabled: false
  kubelet:
    enabled: true
  kubeControllerManager:
    enabled: false
  coreDns:
    enabled: false
  kubeDns:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeStateMetrics:
    enabled: true
  # kube-state-metrics subchart values (passed through kube-prometheus-stack to the
  # kube-state-metrics subchart; distinct from the `kubeStateMetrics.enabled` toggle).
  kube-state-metrics:
    # -- Node label keys exposed as `kube_node_labels` series. The AIGateway dashboard
    # resolves GPU nodes by accelerator vendor/model from these (variables `amd_hostname`
    # / `nvidia_hostname`). Keep the list narrow to avoid label cardinality blow-up.
    metricLabelsAllowlist:
      - "nodes=[moai.moreh.io/accelerator.vendor,moai.moreh.io/accelerator.model]"
  nodeExporter:
    enabled: true
  prometheusOperator:
    enabled: true
  prometheus:
    enabled: true
  thanosRuler:
    enabled: false

# Heimdall alert provisioning consumed by the grafana-sc-alerts sidecar.
# Rules, templates, policies, and the `heimdall-slack` contact point are all
# delivered as ConfigMaps labelled `grafana_alert=1`; routing is hardcoded.
alerts:
  heimdall:
    # -- Enable Heimdall alert provisioning. Requires `slack.webhookUrl` or
    # `slack.existingSecret`. Set `prometheus-stack.grafana.grafana.ini.server.root_url`
    # for clickable links in Slack messages.
    enabled: false

    slack:
      # -- Slack webhook URL (inline). Used only when `existingSecret` is empty.
      # SECRET — pass via `--set-file` or an external secrets operator; never commit.
      webhookUrl: ""
      # -- Externally-managed Secret holding the webhook URL. Resolved by Helm
      # `lookup` at install/upgrade time and takes precedence over `webhookUrl`;
      # renders empty under `helm template`/`--dry-run` (no cluster access).
      existingSecret: ""
      # Mirrors the Bitnami `secretKeys.<role>Key` pattern so operators can
      # match the field name to the secret's actual data key.
      secretKeys:
        # -- Data key inside `existingSecret` that stores the webhook URL.
        webhookUrlKey: webhook-url

replicator:
  # -- Enable mittwald/kubernetes-replicator. Set to false if already deployed.
  enabled: true

nfd:
  # -- Enable kubernetes-sigs/node-feature-discovery. Set to false if already deployed.
  enabled: true

  worker:
    # -- NFD Worker Tolerations to allow NFD workers to deploy to GPU nodes
    tolerations:
      - key: "amd.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "amd-dcm"
        operator: "Equal"
        value: "up"
        effect: "NoExecute"
      - key: "amd-gpu-unhealthy"
        operator: "Exists"
        effect: "NoSchedule"

minio:
  # -- Enable minio/minio as the S3-compatible object storage backend for Loki and Tempo.
  # Set to false if MinIO is already deployed; in that case, configure loki/tempo storage
  # to point to the existing MinIO service.
  enabled: true

  mode: standalone

  # -- MinIO root user.
  rootUser: minio
  # -- MinIO root password. Override with a strong password in production.
  rootPassword: "minio123!"

  persistence:
    enabled: false

  # Buckets pre-created by the MinIO sub-chart's own provisioning. This list does
  # NOT drive the scoped per-consumer setup: the minio-init Job
  # (templates/minio/init-job.yaml) creates the bucket + bucket-scoped policy +
  # dedicated user for each enabled consumer (loki, tempo) from its
  # <consumer>-bucket Secret/ConfigMap, independent of this list.
  buckets:
    - name: loki
    - name: tempo

  resources:
    requests:
      memory: 2Gi

# Settings for Loki's object storage bucket.
# When minio.enabled: true, these default to a dedicated "loki" MinIO user that the
# minio-init Job scopes to the loki bucket (not the MinIO root user).
# When minio.enabled: false (external MinIO), set all three fields explicitly.
lokiBucket:
  # -- MinIO service host for Loki storage. Defaults to the bundled MinIO service name (usually <release>-minio; <release> if the release name already contains "minio").
  # Use the FQDN (e.g. minio.minio.svc.cluster.local) for cross-namespace access.
  host: ""
  # -- MinIO access key for Loki storage. Defaults to the dedicated "loki" user.
  accessKey: ""
  # -- MinIO secret key for Loki storage. Defaults to a generated random value
  # (preserved across upgrades); set to pin it explicitly (recommended in production).
  secretKey: ""

loki:
  # -- Enable grafana/loki.
  enabled: true

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    image:
      tag: "3.5.1"
    schemaConfig:
      configs:
        - from: "2024-06-24"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      bucketNames:
        chunks: loki
        ruler: loki
        admin: loki
      s3:
        s3ForcePathStyle: true
        # ${...} references are resolved by Loki at startup via -config.expand-env=true.
        endpoint: "http://${BUCKET_HOST}:${BUCKET_PORT}"
        region: "${BUCKET_REGION}"
        accessKeyId: "${AWS_ACCESS_KEY_ID}"
        secretAccessKey: "${AWS_SECRET_ACCESS_KEY}"
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
        cache_ttl: 168h
    structuredConfig:
      compactor:
        retention_enabled: true
        delete_request_store: s3
      limits_config:
        max_entries_limit_per_query: 50000
        split_queries_by_interval: 24h
        ingestion_rate_mb: 30
        ingestion_burst_size_mb: 60
        per_stream_rate_limit: 30MB
        per_stream_rate_limit_burst: 60MB
        max_query_series: 10000
        retention_period: 2160h # 90 days

  # Each component runs with -config.expand-env=true so that ${BUCKET_HOST} etc.
  # in the Loki config are expanded from the loki-bucket ConfigMap and Secret.
  gateway:
    replicas: 1
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-bucket
      - configMapRef:
          name: loki-bucket

  read:
    replicas: 1
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-bucket
      - configMapRef:
          name: loki-bucket

  write:
    replicas: 1
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-bucket
      - configMapRef:
          name: loki-bucket
    persistence:
      volumeClaimsEnabled: false

  backend:
    replicas: 1
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-bucket
      - configMapRef:
          name: loki-bucket
    persistence:
      volumeClaimsEnabled: false

  lokiCanary:
    tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

# Settings for Tempo's object storage bucket (mirrors lokiBucket).
# When minio.enabled: true, these default to a dedicated "tempo" MinIO user that the
# minio-init Job scopes to the tempo bucket (not the MinIO root user).
# When minio.enabled: false (external MinIO), set all three fields explicitly.
tempoBucket:
  # -- MinIO service host for Tempo storage. Defaults to the bundled MinIO service name (usually <release>-minio; <release> if the release name already contains "minio").
  # Use the FQDN (e.g. minio.minio.svc.cluster.local) for cross-namespace access.
  host: ""
  # -- MinIO access key for Tempo storage. Defaults to the dedicated "tempo" user.
  accessKey: ""
  # -- MinIO secret key for Tempo storage. Defaults to a generated random value
  # (preserved across upgrades); set to pin it explicitly (recommended in production).
  secretKey: ""

tempo:
  # -- Enable grafana-community/tempo-distributed.
  enabled: true

  # -- Disable Tempo usage reporting/analytics.
  reportingEnabled: false

  # Inject the tempo-bucket credentials into every component (mirrors Loki).
  global:
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-bucket
      - configMapRef:
          name: tempo-bucket

  # Enable the OTLP receivers on the distributor: gRPC :4317, HTTP :4318.
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true

  storage:
    trace:
      backend: s3
      s3:
        # ${...} references are resolved at startup via -config.expand-env=true.
        bucket: "${BUCKET_NAME}"
        endpoint: "${BUCKET_HOST}:${BUCKET_PORT}"
        access_key: "${AWS_ACCESS_KEY_ID}"
        secret_key: "${AWS_SECRET_ACCESS_KEY}"
        region: "${BUCKET_REGION}"
        insecure: true
        forcepathstyle: true

  # Lightweight defaults: a single replica per component, ephemeral ingester.
  # valhalla production runs distributor 2 / ingester 3 / querier 2 /
  # query-frontend 2 / compactor 1 / memcached 2, with ingester persistence
  # (50Gi, storageClass ceph-block). Those are cluster-specific and left to
  # operator overrides.
  ingester:
    replicas: 1
    persistence:
      enabled: false
    config:
      # Single-ingester default: the write quorum must match the replica count,
      # otherwise the distributor rejects writes ("N live replicas required").
      # Scale this with ingester.replicas (valhalla runs 3 / 3).
      replication_factor: 1
  distributor:
    replicas: 1
  querier:
    replicas: 1
  queryFrontend:
    replicas: 1
  compactor:
    replicas: 1
    config:
      compaction:
        block_retention: 2160h # 90 days, matches Loki retention
  memcached:
    enabled: true
    replicas: 1

  # Tempo's own ServiceMonitor is disabled; rely on the bundled prometheus-stack.
  metaMonitoring:
    serviceMonitor:
      enabled: false

vector:
  # -- Enable vector/vector as a DaemonSet log collector.
  enabled: true

  role: Agent

  tolerations:
    - key: node.kubernetes.io/unschedulable
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 5
    - key: node-role.kubernetes.io/compute
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: amd.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10

  customConfig:
    data_dir: /vector-data
    api:
      enabled: true
      address: "0.0.0.0:8686"
    sources:
      mif_logs:
        type: kubernetes_logs
        # Only collect logs from pods that explicitly opt in to MIF log collection.
        extra_label_selector: "mif.moreh.io/log.collect=true"
      aigateway_logs:
        type: kubernetes_logs
        # AIGateway is a first-class MIF component. The Heimdall controller stamps
        # the immutable label app.kubernetes.io/name=aigateway on every AIGateway
        # pod and exposes no field to set mif.moreh.io/log.collect, so its logs are
        # collected automatically by that label — symmetric with how the controller
        # auto-creates a ServiceMonitor/PodMonitor for its metrics (no per-pod opt-in).
        # Disjoint from mif_logs: an AIGateway pod has no path to log.collect=true.
        extra_label_selector: "app.kubernetes.io/name=aigateway"
    transforms:
      mif_log_transform:
        type: remap
        inputs:
          - mif_logs
          - aigateway_logs
        source: |
          .namespace          = .kubernetes.pod_namespace
          .node_name          = "$VECTOR_SELF_NODE_NAME"
          .app                = get(.kubernetes.pod_labels, ["app.kubernetes.io/name"])      ?? ""
          .inference_service  = get(.kubernetes.pod_labels, ["app.kubernetes.io/instance"])  ?? ""
          .pool_name          = get(.kubernetes.pod_labels, ["mif.moreh.io/pool"])           ?? ""
          .role               = get(.kubernetes.pod_labels, ["mif.moreh.io/role"])           ?? ""

          log_format = get(.kubernetes.pod_labels, ["mif.moreh.io/log.format"]) ?? ""

          # AIGateway always emits flat JSON (timestamp/level/target/message plus
          # request_id/trace_id span fields) but cannot carry the log.format opt-in
          # label, so parse JSON for it unconditionally.
          if log_format == "json" || .app == "aigateway" {
            structured, err = parse_json(.message)
            if err == null {
              . = merge!(., structured)
              # Go slog emits "msg"/"time"; Rust components (AIGateway) emit
              # "message"/"timestamp", which merge! already placed directly.
              # Guard the slog promotion on field existence: get(., ["msg"])
              # returns null WITHOUT an error when "msg" is absent, so an
              # `err == null` guard would null the merged message/timestamp.
              if exists(.msg) {
                .message = .msg
                del(.msg)
              }
              if exists(.time) {
                .timestamp = .time
                del(.time)
              }
            }
          }

          del(.file)
          del(.source_type)
          del(.stream)
          del(.kubernetes)
    sinks:
      loki:
        type: loki
        # Rendered by the vector chart's tpl in the vector subchart context, so we
        # mirror Loki's gateway fullname from .Release.Name (parent .Values.loki is
        # not visible here). Single-quoted YAML so the inner double quotes in the
        # helper call need no escaping.
        endpoint: 'http://{{ include "mif.subchartFullname" (dict "name" "loki" "ctx" .) }}-gateway'
        inputs:
          - mif_log_transform
        encoding:
          codec: json
        labels:
          # {{`{{ field }}`}} is Go raw-string escaping required because the
          # Vector chart renders customConfig through Helm's tpl function.
          # tpl sees {{`{{ namespace }}`}} → evaluates raw string → outputs {{ namespace }}
          # which is Vector's own field-template syntax.
          namespace: "{{`{{ namespace }}`}}"
          inference_service: "{{`{{ inference_service }}`}}"
          pool_name: "{{`{{ pool_name }}`}}"
          role: "{{`{{ role }}`}}"
          node_name: "{{`{{ node_name }}`}}"
          app: "{{`{{ app }}`}}"
          level: "{{`{{ level }}`}}"

ecrTokenRefresher:
  # -- Enable ECR token refresher.
  enabled: true

  image:
    # -- Image repository.
    repository: heyvaldemar/aws-kubectl
    # -- Image tag (defaults to chart appVersion if not set).
    tag: 2.0.0
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- Image pull secrets.
    pullSecrets: []

  # -- Cron schedule in standard cron format.
  schedule: "0 */6 * * *"

  aws:
    # -- AWS Region.
    region: ap-northeast-2
    # -- AWS_ACCESS_KEY_ID
    accessKeyId: ""
    # -- AWS_SECRET_ACCESS_KEY
    secretAccessKey: ""

  pullSecret:
    # -- Name of the container registry secret to create or update.
    name: moreh-registry
    # -- URL of the container registry.
    server: 255250787067.dkr.ecr.ap-northeast-2.amazonaws.com
    # -- Username for the container registry access.
    username: AWS
    # -- Annotations to add to the generated secret.
    annotations:
      replicator.v1.mittwald.de/replicate-to-matching: "mif=enabled"

  serviceAccount:
    # -- Whether to create a ServiceAccount.
    create: true
    # -- Whether to automatically mount API credentials.
    automount: true
    # -- Annotations added to the ServiceAccount.
    annotations: {}
    # -- Name of the ServiceAccount (auto-generated if empty and create is true).
    name: ""
