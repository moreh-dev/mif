apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: quickstart-vllm-qwen-qwen3-vl-8b-instruct-amd-mi250-tp2
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: qwen
    mif.moreh.io/model.name: qwen3-vl-8b-instruct
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: amd
    mif.moreh.io/accelerator.model: mi250
    mif.moreh.io/parallelism: tp2
spec:
  framework: vllm
  model:
    name: Qwen/Qwen3-VL-8B-Instruct
  parallelism:
    tensor: 2
  template:
    spec:
      containers:
        - name: main
          image: 255250787067.dkr.ecr.ap-northeast-2.amazonaws.com/quickstart/moreh-vllm:v0.17.1.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --disable-uvicorn-access-log
                --no-enable-log-requests
                --max-model-len -1
                --max-num-batched-tokens 8192
          resources:
            requests:
              amd.com/gpu: 2
            limits:
              amd.com/gpu: 2
      nodeSelector:
        moai.moreh.io/accelerator.vendor: amd
        moai.moreh.io/accelerator.model: mi250
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
