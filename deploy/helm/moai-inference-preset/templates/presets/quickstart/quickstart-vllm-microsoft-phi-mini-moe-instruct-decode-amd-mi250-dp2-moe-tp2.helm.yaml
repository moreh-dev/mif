apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: quickstart-vllm-microsoft-phi-mini-moe-instruct-decode-amd-mi250-dp2-moe-tp2
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: microsoft
    mif.moreh.io/model.name: phi-mini-moe-instruct
    mif.moreh.io/role: decode
    mif.moreh.io/accelerator.vendor: amd
    mif.moreh.io/accelerator.model: mi250
    mif.moreh.io/parallelism: dp2-moe-tp2
spec:
  framework: vllm
  model:
    name: microsoft/Phi-mini-MoE-instruct
  parallelism:
    data: 2
  workerTemplate:
    spec:
      containers:
        - name: main
          image: 255250787067.dkr.ecr.ap-northeast-2.amazonaws.com/quickstart/moreh-vllm:v0.17.1.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --disable-uvicorn-access-log
                --no-enable-log-requests
                --max-model-len -1
                --max-num-batched-tokens 4096
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_consumer"}'
          resources:
            requests:
              amd.com/gpu: 2
            limits:
              amd.com/gpu: 2
      nodeSelector:
        moai.moreh.io/accelerator.vendor: amd
        moai.moreh.io/accelerator.model: mi250
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
