apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.15.1-zai-org-glm-4.7-flash-nvidia-h100-tp4-moe-tp4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: zai-org
    mif.moreh.io/model.name: glm-4.7-flash
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: h100
    mif.moreh.io/parallelism: "tp4-moe-tp4"
spec:
  framework: vllm
  model:
    name: zai-org/GLM-4.7-Flash
  parallelism:
    tensor: 4
  template:
    spec:
      containers:
        - name: main
          image: vllm/vllm-openai:v0.15.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --tool-call-parser glm47
                --reasoning-parser glm45
                --max-model-len 200000
                --max-num-seqs 64
                --gpu-memory-utilization 0.90
                --kv-cache-dtype auto
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: h100
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
