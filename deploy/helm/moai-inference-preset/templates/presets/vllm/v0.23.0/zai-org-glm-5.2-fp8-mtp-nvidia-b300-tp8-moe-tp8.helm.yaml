apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.23.0-zai-org-glm-5.2-fp8-mtp-nvidia-b300-tp8-moe-tp8
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: zai-org
    mif.moreh.io/model.name: glm-5.2-fp8
    mif.moreh.io/model.mtp: "true"
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: b300
    mif.moreh.io/parallelism: "tp8-moe-tp8"
spec:
  framework: vllm
  model:
    name: zai-org/GLM-5.2-FP8
  parallelism:
    tensor: 8
  template:
    spec:
      containers:
        - name: main
          # GLM-5.2 has day-0 support only from vLLM v0.23.0 (unlike GLM-5.1 which
          # runs on v0.22.0). The repo ships NO remote .py, so --trust-remote-code is
          # omitted here (it was required by the GLM-5.1 preset). Flags follow the
          # vLLM recipe's 8xB200 full-1M-context config (Blackwell == B300):
          #   - --kv-cache-dtype fp8_e4m3 + --max-num-seqs 32 to fit the 1M KV cache
          #   - MTP num_speculative_tokens 5 (recipe), vs 3 on the GLM-5.1 preset
          #   - VLLM_DEEP_GEMM_WARMUP=skip avoids the B300 DeepGEMM warm-up crash
          image: vllm/vllm-openai:v0.23.0
          env:
            - name: VLLM_DEEP_GEMM_WARMUP
              value: "skip"
            - name: ISVC_EXTRA_ARGS
              value: >-
                --tool-call-parser glm47
                --reasoning-parser glm45
                --enable-auto-tool-choice
                --max-model-len -1
                --gpu-memory-utilization 0.90
                --kv-cache-dtype fp8_e4m3
                --speculative-config.method mtp
                --speculative-config.num_speculative_tokens 5
                --max-num-seqs 32
                --chat-template-content-format string
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: b300
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
