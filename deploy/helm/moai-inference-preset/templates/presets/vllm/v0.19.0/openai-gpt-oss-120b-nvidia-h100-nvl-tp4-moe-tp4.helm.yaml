apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.19.0-openai-gpt-oss-120b-nvidia-h100-nvl-tp4-moe-tp4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: openai
    mif.moreh.io/model.name: gpt-oss-120b
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: h100-nvl
    mif.moreh.io/parallelism: "tp4-moe-tp4"
spec:
  framework: vllm
  model:
    name: openai/gpt-oss-120b
  parallelism:
    tensor: 4
  template:
    spec:
      containers:
        - name: main
          image: vllm/vllm-openai:v0.19.0
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len -1
                --gpu-memory-utilization 0.90
                --max-num-batched-tokens 8192
                --max-cudagraph-capture-size 2048
                --tool-call-parser openai
                --enable-auto-tool-choice
                --exclude-tools-when-tool-choice-none
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: h100-nvl
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
