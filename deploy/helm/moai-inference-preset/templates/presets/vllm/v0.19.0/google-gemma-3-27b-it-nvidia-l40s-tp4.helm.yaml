apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.19.0-google-gemma-3-27b-it-nvidia-l40s-tp4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: google
    mif.moreh.io/model.name: gemma-3-27b-it
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: l40s
    mif.moreh.io/parallelism: "tp4"
spec:
  framework: vllm
  model:
    name: google/gemma-3-27b-it
  parallelism:
    tensor: 4
  template:
    spec:
      containers:
        - name: main
          image: vllm/vllm-openai:v0.19.0
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len -1
                --gpu-memory-utilization 0.90
                --limit-mm-per-prompt image=0 audio=0
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: l40s
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
