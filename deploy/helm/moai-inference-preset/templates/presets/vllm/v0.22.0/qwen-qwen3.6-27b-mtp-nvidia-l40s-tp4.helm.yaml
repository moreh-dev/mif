apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.22.0-qwen-qwen3.6-27b-mtp-nvidia-l40s-tp4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: qwen
    mif.moreh.io/model.name: qwen3.6-27b
    mif.moreh.io/model.mtp: "true"
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: l40s
    mif.moreh.io/parallelism: "tp4"
spec:
  framework: vllm
  model:
    name: Qwen/Qwen3.6-27B
  parallelism:
    tensor: 4
  template:
    spec:
      containers:
        - name: main
          image: vllm/vllm-openai:v0.22.0
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len 262144
                --reasoning-parser qwen3
                --tool-call-parser qwen3_coder
                --enable-auto-tool-choice
                --mm-encoder-tp-mode data
                --speculative-config '{"num_speculative_tokens":1,"method":"mtp"}'
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
