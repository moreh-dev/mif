apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.17.0-openai-gpt-oss-120b-prefill-nvidia-h100-sxm-tp8-moe-tp8
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: openai
    mif.moreh.io/model.name: gpt-oss-120b
    mif.moreh.io/role: prefill
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: h100-sxm
    mif.moreh.io/parallelism: "tp8-moe-tp8"
spec:
  framework: vllm
  model:
    name: openai/gpt-oss-120b
  parallelism:
    tensor: 8
  template:
    spec:
      containers:
        - name: main
          image: vllm/vllm-openai:v0.17.0
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --enable-auto-tool-choice
                --tool-call-parser openai
                --reasoning-parser openai_gptoss
                --max-num-seqs 128
                --max-num-batched-tokens 8192
                --max-cudagraph-capture-size 2048
                --max-model-len -1
                --disable-uvicorn-access-log
                --exclude-tools-when-tool-choice-none
          resources:
            requests:
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: h100-sxm
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
