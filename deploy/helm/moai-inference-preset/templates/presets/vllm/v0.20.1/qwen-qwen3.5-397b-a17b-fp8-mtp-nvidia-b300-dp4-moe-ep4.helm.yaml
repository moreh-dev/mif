apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.20.1-qwen-qwen3.5-397b-a17b-fp8-mtp-nvidia-b300-dp4-moe-ep4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: qwen
    mif.moreh.io/model.name: qwen3.5-397b-a17b-fp8
    mif.moreh.io/model.mtp: "true"
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: b300
    mif.moreh.io/parallelism: "dp4-moe-ep4"
spec:
  framework: vllm
  model:
    name: Qwen/Qwen3.5-397B-A17B-FP8
  parallelism:
    data: 4
    expert: true
  template:
    spec:
      containers:
        - name: main
          # v0.20.1 includes CUDA 13.0.2 official wheel (SM103 supported).
          # vllm#38083 auto-disables DeepGEMM for Qwen3.5 on Blackwell — VLLM_USE_DEEP_GEMM=0 not needed.
          image: vllm/vllm-openai:v0.20.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len -1
                --gpu-memory-utilization 0.92
                --reasoning-parser qwen3
                --tool-call-parser qwen3_coder
                --enable-auto-tool-choice
                --enable-prefix-caching
                --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
                --limit-mm-per-prompt '{"image":2,"video":1}'
                --mm-encoder-tp-mode data
                --mm-processor-cache-type shm
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: b300
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
