apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.20.1-moonshotai-kimi-k2.6-nvidia-b300-tp8
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: moonshotai
    mif.moreh.io/model.name: kimi-k2.6
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: b300
    mif.moreh.io/parallelism: "tp8"
spec:
  framework: vllm
  model:
    name: moonshotai/Kimi-K2.6
  parallelism:
    tensor: 8
  template:
    spec:
      containers:
        - name: main
          # Kimi K2.6 (released 2026-04-20): 1.04T-param MoE, 32B activated, 256K context, MLA.
          # Eagle3 draft model: lightseekorg/kimi-k2.6-eagle3 (no native MTP).
          image: vllm/vllm-openai:v0.20.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len -1
                --gpu-memory-utilization 0.92
                --mm-encoder-tp-mode data
                --mm-processor-cache-type shm
                --limit-mm-per-prompt '{"image":4,"video":1}'
                --tool-call-parser kimi_k2
                --reasoning-parser kimi_k2
                --enable-auto-tool-choice
                --speculative-config '{"model":"lightseekorg/kimi-k2.6-eagle3","method":"eagle3","num_speculative_tokens":3}'
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: b300
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
