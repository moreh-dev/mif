apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.20.1-moonshotai-kimi-k2.5-nvidia-b300-tp8
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: moonshotai
    mif.moreh.io/model.name: kimi-k2.5
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: b300
    mif.moreh.io/parallelism: "tp8"
spec:
  framework: vllm
  model:
    name: moonshotai/Kimi-K2.5
  parallelism:
    tensor: 8
  template:
    spec:
      containers:
        - name: main
          # v0.20.1 includes CUDA 13.0.2 official wheel (SM103 supported).
          # Image input supported. Video input NOT supported in vLLM (Moonshot's official
          # API only — vLLM kimi_k2 modeling code does not register a video processor).
          # → --limit-mm-per-prompt video=0 to prevent video_url errors.
          image: vllm/vllm-openai:v0.20.1
          env:
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len -1
                --gpu-memory-utilization 0.92
                --mm-encoder-tp-mode data
                --mm-processor-cache-type shm
                --limit-mm-per-prompt '{"image":4,"video":0}'
                --tool-call-parser kimi_k2
                --reasoning-parser kimi_k2
                --enable-auto-tool-choice
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: b300
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
