apiVersion: odin.moreh.io/v1alpha1
kind: InferenceServiceTemplate
metadata:
  name: vllm-v0.20.1-google-gemma-4-31b-it-nvidia-l40s-tp4
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "mif.preset.labels" . | nindent 4 }}
    mif.moreh.io/model.org: google
    mif.moreh.io/model.name: gemma-4-31b-it
    mif.moreh.io/role: e2e
    mif.moreh.io/accelerator.vendor: nvidia
    mif.moreh.io/accelerator.model: l40s
    mif.moreh.io/parallelism: "tp4"
spec:
  framework: vllm
  model:
    name: google/gemma-4-31B-it
  parallelism:
    tensor: 4
  template:
    spec:
      containers:
        - name: main
          # v0.20.1 includes transformers v5 (gemma4 arch built-in).
          # Multimodal enabled: image input supported. 31B has no audio encoder.
          # Tool calling requires the official Gemma 4 chat template.
          image: vllm/vllm-openai:v0.20.1
          env:
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn  # required for trust_remote_code + TP>1 (vllm#32611)
            - name: ISVC_EXTRA_ARGS
              value: >-
                --trust-remote-code
                --max-model-len 32768
                --gpu-memory-utilization 0.90
                --tool-call-parser gemma4
                --reasoning-parser gemma4
                --enable-auto-tool-choice
                --speculative-config '{"model":"google/gemma-4-31B-it-assistant","num_speculative_tokens":3}'
                --limit-mm-per-prompt '{"image":4,"audio":0}'
                --mm-processor-kwargs '{"max_soft_tokens": 280}'
                --mm-encoder-tp-mode data
                --async-scheduling
                --disable-uvicorn-access-log
                --no-enable-log-requests
          resources:
            requests:
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
      nodeSelector:
        moai.moreh.io/accelerator.vendor: nvidia
        moai.moreh.io/accelerator.model: l40s
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
